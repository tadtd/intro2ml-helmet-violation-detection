# Optional for this feature. The API, worker, and Redis manifests are the
# required runtime handoff; enable this only when frontend deployment is in scope.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: helmet-frontend
  namespace: helmet-violation
  labels:
    app.kubernetes.io/name: helmet-frontend
    app.kubernetes.io/component: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: helmet-frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: helmet-frontend
        app.kubernetes.io/component: frontend
    spec:
      containers:
        - name: frontend
          image: REGION-docker.pkg.dev/PROJECT_ID/REPOSITORY/helmet-frontend:TAG
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: NEXT_PUBLIC_API_BASE_URL
              value: https://API_HOSTNAME_PLACEHOLDER
            - name: NEXT_PUBLIC_SUPABASE_URL
              value: https://SUPABASE_PROJECT_REF.supabase.co
            - name: NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY
              valueFrom:
                secretKeyRef:
                  name: helmet-frontend-public-config
                  key: NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY
---
apiVersion: v1
kind: Service
metadata:
  name: helmet-frontend
  namespace: helmet-violation
  labels:
    app.kubernetes.io/name: helmet-frontend
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: helmet-frontend
  ports:
    - name: http
      port: 3000
      targetPort: http
