apiVersion: apps/v1
kind: Deployment
metadata:
  name: helmet-redis
  namespace: helmet-violation
  labels:
    app.kubernetes.io/name: helmet-redis
    app.kubernetes.io/component: queue
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: helmet-redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: helmet-redis
        app.kubernetes.io/component: queue
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          args: ["redis-server", "--appendonly", "yes"]
          ports:
            - name: redis
              containerPort: 6379
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: helmet-redis
  namespace: helmet-violation
  labels:
    app.kubernetes.io/name: helmet-redis
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: helmet-redis
  ports:
    - name: redis
      port: 6379
      targetPort: redis
