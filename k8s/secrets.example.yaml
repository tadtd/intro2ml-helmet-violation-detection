# Example only. Do not commit real secret values.
# Create real Kubernetes Secrets from an approved secret source outside git, or
# inject values from GCP Secret Manager through the infrastructure owner's
# approved process. External Secrets is not required by this repository.
apiVersion: v1
kind: Secret
metadata:
  name: helmet-api-secrets
  namespace: helmet-violation
  annotations:
    secret-source: "PLACEHOLDER: GCP Secret Manager or kubectl create secret"
type: Opaque
stringData:
  SUPABASE_URL: ""
  SUPABASE_ANON_KEY: ""
  SUPABASE_SERVICE_ROLE_KEY: ""
  SUPABASE_JWT_SECRET: ""
---
apiVersion: v1
kind: Secret
metadata:
  name: helmet-frontend-public-config
  namespace: helmet-violation
  annotations:
    secret-source: "PLACEHOLDER: publishable frontend config only"
type: Opaque
stringData:
  NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ""
