apiVersion: apps/v1
kind: Deployment
metadata:
  name: helmet-api
  namespace: helmet-violation
  labels:
    app.kubernetes.io/name: helmet-api
    app.kubernetes.io/component: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: helmet-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: helmet-api
        app.kubernetes.io/component: api
    spec:
      containers:
        - name: api
          image: REGION-docker.pkg.dev/PROJECT_ID/REPOSITORY/helmet-api:TAG
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: ENVIRONMENT
              value: production
            - name: REDIS_URL
              value: redis://helmet-redis:6379/0
            - name: SUPABASE_VIDEO_BUCKET
              value: videos
            - name: SUPABASE_STORAGE_BUCKET
              value: violations
            - name: SUPABASE_URL
              valueFrom:
                secretKeyRef:
                  name: helmet-api-secrets
                  key: SUPABASE_URL
            - name: SUPABASE_ANON_KEY
              valueFrom:
                secretKeyRef:
                  name: helmet-api-secrets
                  key: SUPABASE_ANON_KEY
            - name: SUPABASE_SERVICE_ROLE_KEY
              valueFrom:
                secretKeyRef:
                  name: helmet-api-secrets
                  key: SUPABASE_SERVICE_ROLE_KEY
            - name: SUPABASE_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: helmet-api-secrets
                  key: SUPABASE_JWT_SECRET
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: helmet-api
  namespace: helmet-violation
  labels:
    app.kubernetes.io/name: helmet-api
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: helmet-api
  ports:
    - name: http
      port: 8000
      targetPort: http
