name: Deploy GKE

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production
      operation:
        description: Operation to run
        required: true
        default: deploy
        type: choice
        options:
          - deploy
          - rollback
          - smoke-test
      commit_sha:
        description: Commit SHA for rollback/redeploy; defaults to current SHA
        required: false

permissions:
  contents: read

env:
  GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  GCP_REGION: ${{ vars.GKE_REGION }}
  GKE_CLUSTER: ${{ vars.GKE_CLUSTER }}
  ARTIFACT_REGISTRY_REPOSITORY: ${{ vars.ARTIFACT_REGISTRY_REPOSITORY }}
  DUCKDNS_DOMAIN: ${{ vars.DUCKDNS_DOMAIN }}
  DEPLOY_ENVIRONMENT: ${{ inputs.environment || 'staging' }}
  DEPLOY_OPERATION: ${{ inputs.operation || 'deploy' }}
  CERT_MANAGER_VERSION: v1.21.0
  TRAEFIK_CRD_VERSION: v3.7

jobs:
  frontend-checks:
    name: Frontend Lint And Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  backend-checks:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Run backend tests
        working-directory: backend
        run: uv run pytest

  render-manifests:
    name: Render Kustomize Manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Render staging overlay
        run: kubectl kustomize deploy/k8s/overlays/staging > /tmp/staging.yaml

      - name: Render production overlay
        run: kubectl kustomize deploy/k8s/overlays/production > /tmp/production.yaml

  deploy:
    name: Build Publish Deploy
    runs-on: ubuntu-latest
    needs:
      - frontend-checks
      - backend-checks
      - render-manifests
    if: ${{ github.event_name != 'pull_request' }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve deploy SHA
        id: version
        shell: bash
        run: |
          if [ -n "${{ inputs.commit_sha }}" ]; then
            echo "sha=${{ inputs.commit_sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "sha=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          fi

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "${GCP_REGION}-docker.pkg.dev" --quiet

      - name: Build and push service images
        if: ${{ env.DEPLOY_OPERATION == 'deploy' }}
        shell: bash
        run: |
          set -euo pipefail
          REGISTRY="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${ARTIFACT_REGISTRY_REPOSITORY}"
          declare -A DOCKERFILES=(
            [frontend]="frontend/Dockerfile"
            [auth]="backend/auth/Dockerfile"
            [ingestion]="backend/ingestion/Dockerfile"
            [dashboard]="backend/dashboard/Dockerfile"
            [notification]="backend/notification/Dockerfile"
            [orchestration]="backend/orchestration/Dockerfile"
            [inference]="backend/inference/Dockerfile"
          )
          declare -A CONTEXTS=(
            [frontend]="frontend"
            [auth]="backend"
            [ingestion]="backend"
            [dashboard]="backend"
            [notification]="backend"
            [orchestration]="backend"
            [inference]="backend"
          )
          for service in "${!DOCKERFILES[@]}"; do
            image="${REGISTRY}/${service}:${{ steps.version.outputs.sha }}"
            docker build -f "${DOCKERFILES[$service]}" -t "$image" "${CONTEXTS[$service]}"
            docker push "$image"
          done

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.GKE_CLUSTER }}
          location: ${{ env.GCP_REGION }}
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Install kustomize
        shell: bash
        run: |
          set -euo pipefail
          curl -sSLo /tmp/kustomize.tar.gz https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize/v5.4.3/kustomize_v5.4.3_linux_amd64.tar.gz
          tar -xzf /tmp/kustomize.tar.gz -C /tmp
          sudo mv /tmp/kustomize /usr/local/bin/kustomize

      - name: Install cluster add-ons
        if: ${{ env.DEPLOY_OPERATION != 'smoke-test' }}
        shell: bash
        run: |
          set -euo pipefail
          kubectl apply -f "https://github.com/cert-manager/cert-manager/releases/download/${CERT_MANAGER_VERSION}/cert-manager.yaml"
          kubectl apply -f "https://raw.githubusercontent.com/traefik/traefik/${TRAEFIK_CRD_VERSION}/docs/content/reference/dynamic-configuration/kubernetes-crd-definition-v1.yml"

          kubectl -n cert-manager rollout status deployment/cert-manager --timeout=180s
          kubectl -n cert-manager rollout status deployment/cert-manager-cainjector --timeout=180s
          kubectl -n cert-manager rollout status deployment/cert-manager-webhook --timeout=180s
          kubectl wait --for=condition=Established --timeout=120s crd/certificates.cert-manager.io
          kubectl wait --for=condition=Established --timeout=120s crd/clusterissuers.cert-manager.io
          kubectl wait --for=condition=Established --timeout=120s crd/ingressroutes.traefik.io

      - name: Apply Kustomize overlay
        if: ${{ env.DEPLOY_OPERATION != 'smoke-test' }}
        shell: bash
        run: |
          set -euo pipefail
          OVERLAY="deploy/k8s/overlays/${DEPLOY_ENVIRONMENT}"
          NAMESPACE="helmet-${DEPLOY_ENVIRONMENT}"
          REGISTRY="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${ARTIFACT_REGISTRY_REPOSITORY}"
          for service in frontend auth ingestion dashboard notification orchestration inference; do
            (cd "$OVERLAY" && kustomize edit set image \
              "asia-southeast1-docker.pkg.dev/PROJECT_ID/REPOSITORY/${service}=${REGISTRY}/${service}:${{ steps.version.outputs.sha }}")
          done
          kubectl create namespace "$NAMESPACE" --dry-run=client -o yaml | kubectl apply -f -

          secret_env_file="$(mktemp)"
          secret_error_file="$(mktemp)"
          trap 'rm -f "$secret_env_file" "$secret_error_file"' EXIT

          fetch_secret() {
            local env_name="$1"
            local secret_name="$2"
            local value
            if ! value="$(gcloud secrets versions access latest --project "$GCP_PROJECT_ID" --secret "$secret_name" 2>"$secret_error_file")"; then
              echo "::error::Missing or inaccessible GCP Secret Manager secret/version: ${secret_name}"
              cat "$secret_error_file"
              exit 1
            fi
            if [ -z "$value" ]; then
              echo "::error::GCP Secret Manager secret has an empty latest version: ${secret_name}"
              exit 1
            fi
            printf '%s=%s\n' "$env_name" "$value" >> "$secret_env_file"
          }

          fetch_secret SUPABASE_URL helmet-supabase-url
          fetch_secret SUPABASE_ANON_KEY helmet-supabase-anon-key
          fetch_secret SUPABASE_SERVICE_ROLE_KEY helmet-supabase-service-role-key
          fetch_secret SUPABASE_JWT_SECRET helmet-supabase-jwt-secret
          fetch_secret SUPABASE_VIDEO_BUCKET helmet-supabase-video-bucket
          fetch_secret SUPABASE_STORAGE_BUCKET helmet-supabase-storage-bucket
          fetch_secret DUCKDNS_TOKEN helmet-duckdns-token

          kubectl -n "$NAMESPACE" create secret generic helmet-runtime-secrets \
            --from-env-file="$secret_env_file" \
            --dry-run=client \
            -o yaml | kubectl apply -f -

          for attempt in {1..12}; do
            if kubectl apply -f deploy/k8s/base/cert-manager/issuer.yaml; then
              break
            fi
            if [ "$attempt" -eq 12 ]; then
              echo "::error::cert-manager webhook did not become ready for ClusterIssuer apply"
              exit 1
            fi
            echo "cert-manager webhook is not ready yet; retrying ClusterIssuer apply in 10 seconds..."
            sleep 10
          done
          kubectl apply -k "$OVERLAY"

      - name: Wait for rollouts
        shell: bash
        run: |
          set -euo pipefail
          NAMESPACE="helmet-${DEPLOY_ENVIRONMENT}"
          for deployment in frontend ingestion auth dashboard notification orchestration inference-worker realtime-stream traefik; do
            kubectl -n "$NAMESPACE" rollout status "deployment/${deployment}" --timeout=180s
          done
          kubectl -n "$NAMESPACE" rollout status statefulset/redis --timeout=180s

      - name: Run smoke checks
        shell: bash
        run: |
          bash ./deploy/scripts/smoke-test.sh \
            "https://${{ env.DUCKDNS_DOMAIN }}" \
            "helmet-${{ env.DEPLOY_ENVIRONMENT }}"

      - name: Capture release state
        shell: bash
        run: |
          set -euo pipefail
          NAMESPACE="helmet-${DEPLOY_ENVIRONMENT}"
          mkdir -p release-state
          {
            echo "{"
            echo "  \"environment\": \"${DEPLOY_ENVIRONMENT}\","
            echo "  \"operation\": \"${DEPLOY_OPERATION}\","
            echo "  \"commitSha\": \"${{ steps.version.outputs.sha }}\","
            echo "  \"deployedAt\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\","
            echo "  \"images\": ["
            kubectl -n "$NAMESPACE" get deploy -o jsonpath='{range .items[*]}{"    \""}{.metadata.name}{": "}{range .spec.template.spec.containers[*]}{.image}{" "}{end}{"\",\n"}{end}'
            echo "  ]"
            echo "}"
          } > "release-state/${DEPLOY_ENVIRONMENT}-${{ steps.version.outputs.sha }}.json"

      - name: Upload release state
        uses: actions/upload-artifact@v4
        with:
          name: release-state-${{ env.DEPLOY_ENVIRONMENT }}-${{ steps.version.outputs.sha }}
          path: release-state/
