services:
  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  traefik:
    image: traefik:v3.0
    container_name: api-gateway
    ports:
      - "8000:8000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./backend/api-gateway/traefik.yml:/etc/traefik/traefik.yml:ro
    depends_on:
      - auth
      - ingestion
      - notification
      - dashboard

  auth:
    build:
      context: ./backend
      dockerfile: auth/Dockerfile
    container_name: auth-service
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
    ports:
      - "50051:50051"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.auth.rule=PathPrefix(`/api/v1/auth`) || PathPrefix(`/register`)"
      - "traefik.http.routers.auth.entrypoints=web"
      - "traefik.http.routers.auth.middlewares=api-strip"
      - "traefik.http.services.auth.loadbalancer.server.port=8001"
      - "traefik.http.middlewares.api-strip.stripprefix.prefixes=/api/v1"
    depends_on:
      - redis

  ingestion:
    build:
      context: ./backend
      dockerfile: ingestion/Dockerfile
    container_name: ingestion-service
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ingestion.rule=PathPrefix(`/api/v1/videos`) || PathPrefix(`/ws/camera`)"
      - "traefik.http.routers.ingestion.entrypoints=web"
      - "traefik.http.routers.ingestion.middlewares=api-strip"
      - "traefik.http.services.ingestion.loadbalancer.server.port=8002"
    depends_on:
      - redis
      - auth

  notification:
    build:
      context: ./backend
      dockerfile: notification/Dockerfile
    container_name: notification-service
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.notification.rule=PathPrefix(`/ws/status`)"
      - "traefik.http.routers.notification.entrypoints=web"
      - "traefik.http.services.notification.loadbalancer.server.port=8003"
    depends_on:
      - redis

  dashboard:
    build:
      context: ./backend
      dockerfile: dashboard/Dockerfile
    container_name: dashboard-service
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dashboard.rule=PathPrefix(`/api/v1/violations`)"
      - "traefik.http.routers.dashboard.entrypoints=web"
      - "traefik.http.routers.dashboard.middlewares=api-strip"
      - "traefik.http.services.dashboard.loadbalancer.server.port=8004"
    depends_on:
      - redis
      - auth

  orchestration:
    build:
      context: ./backend
      dockerfile: orchestration/Dockerfile
    container_name: orchestration-service
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis

  inference:
    build:
      context: ./backend
      dockerfile: inference/Dockerfile
    container_name: inference-worker
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - USE_STUB_INFERENCE=true
    depends_on:
      - redis
      - orchestration

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: frontend
    env_file:
      - .env
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      - REDIS_URL=redis://redis:6379/0
      - WATCHPACK_POLLING=true
      - NEXT_PUBLIC_WS_URL=ws://localhost:8000
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - traefik

volumes:
  redis-data:
