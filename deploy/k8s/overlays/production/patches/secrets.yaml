apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: helmet-gcp-secrets
spec:
  parameters:
    secrets: |
      - resourceName: "projects/PRODUCTION_PROJECT_ID/secrets/helmet-supabase-url/versions/latest"
        path: "SUPABASE_URL"
      - resourceName: "projects/PRODUCTION_PROJECT_ID/secrets/helmet-supabase-anon-key/versions/latest"
        path: "SUPABASE_ANON_KEY"
      - resourceName: "projects/PRODUCTION_PROJECT_ID/secrets/helmet-supabase-service-role-key/versions/latest"
        path: "SUPABASE_SERVICE_ROLE_KEY"
      - resourceName: "projects/PRODUCTION_PROJECT_ID/secrets/helmet-supabase-jwt-secret/versions/latest"
        path: "SUPABASE_JWT_SECRET"
      - resourceName: "projects/PRODUCTION_PROJECT_ID/secrets/helmet-duckdns-token/versions/latest"
        path: "DUCKDNS_TOKEN"
