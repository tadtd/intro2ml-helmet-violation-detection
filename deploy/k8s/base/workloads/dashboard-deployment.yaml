apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard
  labels:
    app.kubernetes.io/component: dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: dashboard
  template:
    metadata:
      labels:
        app.kubernetes.io/component: dashboard
    spec:
      serviceAccountName: dashboard
      containers:
        - name: dashboard
          image: asia-southeast1-docker.pkg.dev/PROJECT_ID/REPOSITORY/dashboard:COMMIT_SHA
          ports:
            - name: http
              containerPort: 8004
          envFrom:
            - configMapRef:
                name: helmet-runtime-config
            - secretRef:
                name: helmet-runtime-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
