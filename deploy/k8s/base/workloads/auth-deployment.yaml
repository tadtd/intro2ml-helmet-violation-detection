apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth
  labels:
    app.kubernetes.io/component: auth
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: auth
  template:
    metadata:
      labels:
        app.kubernetes.io/component: auth
    spec:
      serviceAccountName: auth
      containers:
        - name: auth
          image: asia-southeast1-docker.pkg.dev/PROJECT_ID/REPOSITORY/auth:COMMIT_SHA
          ports:
            - name: http
              containerPort: 8001
            - name: grpc
              containerPort: 50051
          envFrom:
            - configMapRef:
                name: helmet-runtime-config
            - secretRef:
                name: helmet-runtime-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
