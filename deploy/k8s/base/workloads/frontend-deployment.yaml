apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  labels:
    app.kubernetes.io/component: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/component: frontend
    spec:
      serviceAccountName: frontend
      containers:
        - name: frontend
          image: asia-southeast1-docker.pkg.dev/PROJECT_ID/REPOSITORY/frontend:COMMIT_SHA
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          envFrom:
            - configMapRef:
                name: helmet-runtime-config
          env:
            - name: NEXT_PUBLIC_SUPABASE_URL
              valueFrom:
                secretKeyRef:
                  name: helmet-runtime-secrets
                  key: SUPABASE_URL
            - name: NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY
              valueFrom:
                secretKeyRef:
                  name: helmet-runtime-secrets
                  key: SUPABASE_ANON_KEY
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
