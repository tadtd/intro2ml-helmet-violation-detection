apiVersion: apps/v1
kind: Deployment
metadata:
  name: realtime-stream
  labels:
    app.kubernetes.io/component: realtime-stream
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: realtime-stream
  template:
    metadata:
      labels:
        app.kubernetes.io/component: realtime-stream
    spec:
      serviceAccountName: realtime-stream
      containers:
        - name: realtime-stream
          image: asia-southeast1-docker.pkg.dev/PROJECT_ID/REPOSITORY/inference:COMMIT_SHA
          command: ["uvicorn"]
          args: ["inference.src.stream:app", "--host", "0.0.0.0", "--port", "8005"]
          ports:
            - name: http
              containerPort: 8005
          envFrom:
            - configMapRef:
                name: helmet-runtime-config
            - secretRef:
                name: helmet-runtime-secrets
