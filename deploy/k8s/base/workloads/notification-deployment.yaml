apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification
  labels:
    app.kubernetes.io/component: notification
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: notification
  template:
    metadata:
      labels:
        app.kubernetes.io/component: notification
    spec:
      serviceAccountName: notification
      containers:
        - name: notification
          image: asia-southeast1-docker.pkg.dev/PROJECT_ID/REPOSITORY/notification:COMMIT_SHA
          ports:
            - name: http
              containerPort: 8003
          envFrom:
            - configMapRef:
                name: helmet-runtime-config
            - secretRef:
                name: helmet-runtime-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
