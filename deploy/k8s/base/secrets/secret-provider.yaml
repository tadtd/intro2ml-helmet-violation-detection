apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: helmet-gcp-secrets
spec:
  provider: gcp
  parameters:
    secrets: |
      - resourceName: "projects/PROJECT_ID/secrets/helmet-supabase-url/versions/latest"
        path: "SUPABASE_URL"
      - resourceName: "projects/PROJECT_ID/secrets/helmet-supabase-anon-key/versions/latest"
        path: "SUPABASE_ANON_KEY"
      - resourceName: "projects/PROJECT_ID/secrets/helmet-supabase-service-role-key/versions/latest"
        path: "SUPABASE_SERVICE_ROLE_KEY"
      - resourceName: "projects/PROJECT_ID/secrets/helmet-supabase-jwt-secret/versions/latest"
        path: "SUPABASE_JWT_SECRET"
      - resourceName: "projects/PROJECT_ID/secrets/helmet-duckdns-token/versions/latest"
        path: "DUCKDNS_TOKEN"
  secretObjects:
    - secretName: helmet-runtime-secrets
      type: Opaque
      data:
        - objectName: SUPABASE_URL
          key: SUPABASE_URL
        - objectName: SUPABASE_ANON_KEY
          key: SUPABASE_ANON_KEY
        - objectName: SUPABASE_SERVICE_ROLE_KEY
          key: SUPABASE_SERVICE_ROLE_KEY
        - objectName: SUPABASE_JWT_SECRET
          key: SUPABASE_JWT_SECRET
        - objectName: DUCKDNS_TOKEN
          key: DUCKDNS_TOKEN
